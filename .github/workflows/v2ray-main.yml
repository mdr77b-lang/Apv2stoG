name: V2Ray Daily Checker

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

concurrency:
  group: v2ray-check
  cancel-in-progress: false

jobs:

  check-servers:

    runs-on: ubuntu-latest

    timeout-minutes: 330

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            good_cache.json
            dead_cache.json
            .last_upload_hash
          key: v2ray-cache
          restore-keys: |
            v2ray-cache

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-api-python-client google-auth

      - name: Download Xray
        run: |
          mkdir -p xray_core
          cd xray_core

          wget -O xray.zip \
          https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip

          unzip xray.zip

          chmod +x xray

          ls -lah

      - name: Prepare Runtime
        run: |
          mkdir -p runtime
          mkdir -p cache

      - name: Run V2Ray Checker
        run: |
          python main.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Sync To Google Drive
        run: |
          python gdrive_sync.py
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}

      - name: Save Cache
        uses: actions/cache/save@v4
        with:
          path: |
            good_cache.json
            dead_cache.json
            .last_upload_hash
          key: v2ray-cache
