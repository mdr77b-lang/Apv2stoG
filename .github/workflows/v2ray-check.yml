name: V2Ray Daily Validator

on:
  schedule:
    - cron: '0 0 * * *' # Runs once every day at 00:00 UTC
  workflow_dispatch: # Allows manual triggering from the UI

concurrency:
  group: v2ray-check
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PySocks google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Cache Xray Core
        id: cache-xray
        uses: actions/cache@v4
        with:
          path: xray_core
          key: ${{ runner.os }}-xray-latest

      - name: Download Xray Core (if not cached)
        if: steps.cache-xray.outputs.cache-hit != 'true'
        run: |
          mkdir -p xray_core
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip -d xray_core
          chmod +x xray_core/xray

      - name: Run Validation Script
        run: python v2ray_tester.py

      - name: Check for changes
        id: check_changes
        run: |
          git add working_servers.txt clean_sub.txt
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "[*] No changes in server list. Skipping further steps."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "[+] Changes detected! Proceeding with update."
          fi

      - name: Sync to Google Drive
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: python gdrive_sync.py

      - name: Commit and Push Results (GitHub Backup)
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Auto-update working servers [$(date -u +'%Y-%m-%d %H:%M:%S')] (Daily Check)"
          git pull --rebase origin main
          git push origin main

      - name: Deploy to Public Server List (v2Store-app)
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Clone the public repository
          git clone https://${GH_TOKEN}@github.com/mdr77b-lang/v2Store-app.git public_repo
          # Copy the clean server list to the public repo
          cp clean_sub.txt public_repo/
          # Commit and push to public repo
          cd public_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add clean_sub.txt
          git commit -m "Update server list [$(date -u +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
