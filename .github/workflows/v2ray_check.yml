name: V2Ray Server Validator

on:
  schedule:
    - cron: '0 */12 * * *' # Run every 12 hours (Safer for GitHub Policies)
  workflow_dispatch: # Allow manual run

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PySocks google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Download Xray Core
        run: |
          mkdir -p xray_core
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip -d xray_core
          chmod +x xray_core/xray

      - name: Run Validation Script
        run: python v2ray_tester.py

      - name: Sync to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
        run: python gdrive_sync.py

      - name: Commit and Push Results (GitHub Backup)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f working_servers.txt clean_sub.txt
          git commit -m "Auto-update working servers [$(date)]" || exit 0
          git pull --rebase origin main
          git push origin main
